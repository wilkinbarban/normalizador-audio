name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE (onefile)
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name NormalizadorAudio --icon normalizador_app/assets/icon.ico --collect-data normalizador_app normalizador.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NormalizadorAudio-windows-exe
          path: dist/NormalizadorAudio.exe

      - name: Create GitHub release and attach EXE
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NormalizadorAudio.exe
          generate_release_notes: true
