name: Syntax Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  syntax:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      
      - name: Check syntax with py_compile
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for folder in ('normalizador_app', 'tests'):
            for root, dirs, files in os.walk(folder):
              for f in files:
                if f.endswith('.py'):
                  path = os.path.join(root, f)
                  try:
                    py_compile.compile(path, doraise=True)
                  except py_compile.PyCompileError as e:
                    errors.append(str(e))
          py_compile.compile('normalizador.py', doraise=True)
          if errors:
            print('ERRORS:', *errors, sep='\\n')
            sys.exit(1)
          print('All files compile successfully')
          "
